test_name: phase 5 — hot-moment lookups (Story 3)

# This is the assertion that proves end-to-end extraction actually worked.
# Tokens here come straight from the phase-3 seed content.

includes:
  - !include common.yaml

stages:
  - name: hot moments contain seeded calmers and agitators
    request:
      url: "{base_url}/patients/{patient_id}/hot-moments"
      method: GET
      headers:
        Authorization: "Bearer {tavern.env_vars.API_AUTH_TOKEN}"
    response:
      status_code: 200
      verify_response_with:
        function: tests.journey.helpers:assert_hot_moments_reflect_inputs
        extra_kwargs:
          expected_calmer_tokens:
            - "wilhelmus"
          expected_agitator_tokens:
            - "right"

  - name: vapi /vapi/kb hot read returns documents grounded in seed content
    request:
      url: "{base_url}/vapi/kb?patient_id={patient_id}"
      method: POST
      json:
        message:
          type: knowledge-base-request
          messages:
            - role: user
              content: "how do I calm her if she's upset?"
      headers:
        content-type: application/json
        Authorization: "Bearer {tavern.env_vars.API_AUTH_TOKEN}"
    response:
      status_code: 200
      verify_response_with:
        function: tests.journey.helpers:assert_kb_documents_seeded
        extra_kwargs:
          required_tokens:
            - "wilhelmus"
